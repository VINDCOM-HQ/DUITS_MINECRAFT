name: Build NetherDeck

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify git is available
        run: git --version

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NetherDeck build data
        uses: actions/cache@v4
        with:
          path: .gradle/netherdeck
          key: ${{ runner.os }}-netherdeck-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-netherdeck-

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew cleanBuild build collect --no-daemon --stacktrace

      - name: Upload server JARs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: netherdeck-server-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: build.gradle

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: netherdeck-server-${{ github.sha }}
          path: build/libs

      - name: Extract version
        id: version
        run: echo "version=$(grep -m1 "version " build.gradle | sed "s/.*'\(.*\)'/\1/")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: NetherDeck v${{ steps.version.outputs.version }}
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

services:
  paper-mc:
    build:
      context: ..
      dockerfile: container/Dockerfile
    image: vindcom/netherdeck:1.24.1
    container_name: minecraft-server
    networks:
      - minecraft_network
    ports:
      # Minecraft server ports
      - "25565:25565/tcp"  # Game port
      - "25575:25575/tcp"  # RCON - SECURITY: Only expose if needed, ensure strong MC_RCON_PASSWORD
      - "25565:25565/udp"  # Query - SECURITY: Exposes server info to network scanners
      # MySQL port - SECURITY: Consider firewall rules to restrict access to trusted IPs only
      - "3306:3306/tcp"    # MySQL access
      # Samba ports - SECURITY: Consider firewall rules to restrict access to trusted IPs only
      - "445:445/tcp"      # SMB over TCP
      - "139:139/tcp"      # NetBIOS session
      - "137:137/udp"      # NetBIOS name
      - "138:138/udp"      # NetBIOS datagram
      # Agent relay port - only active when ENABLE_AGENT=true
      - "${AGENT_PORT:-3500}:${AGENT_PORT:-3500}/tcp"
      # Web portal port - only active when ENABLE_WEB_PORTAL=true
      - "${WEB_PORTAL_PORT:-3000}:${WEB_PORTAL_PORT:-3000}/tcp"
    volumes:
      - mc_data:/minecraft
      - mysql_data:/var/lib/mysql
      - smb_logs:/var/log/samba
      - supervisor_logs:/var/log/supervisor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25565"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 10G
        reservations:
          cpus: '2.0'
          memory: 4G
    environment:
      # Infrastructure
      - TZ=${TZ:-UTC}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SMB_USER=${SMB_USER}
      - SMB_PASSWORD=${SMB_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME}
      - MC_MYSQL_BIND=${MC_MYSQL_BIND:-127.0.0.1}
      # Java memory (passed to -Xms/-Xmx)
      - MC_MIN_MEMORY=${MC_MIN_MEMORY:-2G}
      - MC_MAX_MEMORY=${MC_MAX_MEMORY:-6G}
      # Minecraft EULA (set to "true" to accept)
      - MC_EULA=${MC_EULA:-}
      # Server basics
      - MC_MOTD=${MC_MOTD:-}
      - MC_SERVER_PORT=${MC_SERVER_PORT:-}
      - MC_SERVER_IP=${MC_SERVER_IP:-}
      - MC_MAX_PLAYERS=${MC_MAX_PLAYERS:-}
      - MC_LEVEL_NAME=${MC_LEVEL_NAME:-}
      - MC_LEVEL_SEED=${MC_LEVEL_SEED:-}
      - MC_LEVEL_TYPE=${MC_LEVEL_TYPE:-}
      - MC_GENERATOR_SETTINGS=${MC_GENERATOR_SETTINGS:-}
      # Gameplay settings
      - MC_GAMEMODE=${MC_GAMEMODE:-}
      - MC_FORCE_GAMEMODE=${MC_FORCE_GAMEMODE:-}
      - MC_DIFFICULTY=${MC_DIFFICULTY:-}
      - MC_HARDCORE=${MC_HARDCORE:-}
      - MC_PVP=${MC_PVP:-}
      - MC_ALLOW_FLIGHT=${MC_ALLOW_FLIGHT:-}
      - MC_ALLOW_NETHER=${MC_ALLOW_NETHER:-}
      # Spawn settings
      - MC_SPAWN_PROTECTION=${MC_SPAWN_PROTECTION:-}
      - MC_SPAWN_NPCS=${MC_SPAWN_NPCS:-}
      - MC_SPAWN_ANIMALS=${MC_SPAWN_ANIMALS:-}
      - MC_SPAWN_MONSTERS=${MC_SPAWN_MONSTERS:-}
      # World settings
      - MC_VIEW_DISTANCE=${MC_VIEW_DISTANCE:-}
      - MC_SIMULATION_DISTANCE=${MC_SIMULATION_DISTANCE:-}
      - MC_MAX_WORLD_SIZE=${MC_MAX_WORLD_SIZE:-}
      - MC_MAX_BUILD_HEIGHT=${MC_MAX_BUILD_HEIGHT:-}
      - MC_GENERATE_STRUCTURES=${MC_GENERATE_STRUCTURES:-}
      # Security and access
      - MC_ONLINE_MODE=${MC_ONLINE_MODE:-}
      - MC_WHITE_LIST=${MC_WHITE_LIST:-}
      - MC_ENFORCE_WHITELIST=${MC_ENFORCE_WHITELIST:-}
      - MC_ENFORCE_SECURE_PROFILE=${MC_ENFORCE_SECURE_PROFILE:-}
      - MC_ENABLE_COMMAND_BLOCK=${MC_ENABLE_COMMAND_BLOCK:-}
      - MC_OP_PERMISSION_LEVEL=${MC_OP_PERMISSION_LEVEL:-}
      - MC_FUNCTION_PERMISSION_LEVEL=${MC_FUNCTION_PERMISSION_LEVEL:-}
      # RCON configuration
      - MC_ENABLE_RCON=${MC_ENABLE_RCON:-}
      - MC_RCON_PORT=${MC_RCON_PORT:-}
      - MC_RCON_PASSWORD=${MC_RCON_PASSWORD:-}
      - MC_BROADCAST_RCON_TO_OPS=${MC_BROADCAST_RCON_TO_OPS:-}
      # Query configuration
      - MC_ENABLE_QUERY=${MC_ENABLE_QUERY:-}
      - MC_QUERY_PORT=${MC_QUERY_PORT:-}
      # Performance settings
      - MC_MAX_TICK_TIME=${MC_MAX_TICK_TIME:-}
      - MC_NETWORK_COMPRESSION_THRESHOLD=${MC_NETWORK_COMPRESSION_THRESHOLD:-}
      - MC_RATE_LIMIT=${MC_RATE_LIMIT:-}
      - MC_PLAYER_IDLE_TIMEOUT=${MC_PLAYER_IDLE_TIMEOUT:-}
      - MC_ENTITY_BROADCAST_RANGE=${MC_ENTITY_BROADCAST_RANGE:-}
      - MC_MAX_CHAINED_NEIGHBOR_UPDATES=${MC_MAX_CHAINED_NEIGHBOR_UPDATES:-}
      # Server behavior
      - MC_PREVENT_PROXY_CONNECTIONS=${MC_PREVENT_PROXY_CONNECTIONS:-}
      - MC_USE_NATIVE_TRANSPORT=${MC_USE_NATIVE_TRANSPORT:-}
      - MC_SYNC_CHUNK_WRITES=${MC_SYNC_CHUNK_WRITES:-}
      - MC_ENABLE_JMX_MONITORING=${MC_ENABLE_JMX_MONITORING:-}
      - MC_BROADCAST_CONSOLE_TO_OPS=${MC_BROADCAST_CONSOLE_TO_OPS:-}
      - MC_ENABLE_STATUS=${MC_ENABLE_STATUS:-}
      - MC_HIDE_ONLINE_PLAYERS=${MC_HIDE_ONLINE_PLAYERS:-}
      - MC_PAUSE_WHEN_EMPTY_SECONDS=${MC_PAUSE_WHEN_EMPTY_SECONDS:-}
      # Resource pack
      - MC_RESOURCE_PACK=${MC_RESOURCE_PACK:-}
      - MC_RESOURCE_PACK_SHA1=${MC_RESOURCE_PACK_SHA1:-}
      - MC_RESOURCE_PACK_ID=${MC_RESOURCE_PACK_ID:-}
      - MC_REQUIRE_RESOURCE_PACK=${MC_REQUIRE_RESOURCE_PACK:-}
      - MC_RESOURCE_PACK_PROMPT=${MC_RESOURCE_PACK_PROMPT:-}
      # Data packs
      - MC_INITIAL_ENABLED_PACKS=${MC_INITIAL_ENABLED_PACKS:-}
      - MC_INITIAL_DISABLED_PACKS=${MC_INITIAL_DISABLED_PACKS:-}
      # Advanced settings
      - MC_ACCEPTS_TRANSFERS=${MC_ACCEPTS_TRANSFERS:-}
      - MC_LOG_IPS=${MC_LOG_IPS:-}
      - MC_DEBUG=${MC_DEBUG:-}
      - MC_BUG_REPORT_LINK=${MC_BUG_REPORT_LINK:-}
      - MC_REGION_FILE_COMPRESSION=${MC_REGION_FILE_COMPRESSION:-}
      - MC_TEXT_FILTERING_CONFIG=${MC_TEXT_FILTERING_CONFIG:-}
      - MC_TEXT_FILTERING_VERSION=${MC_TEXT_FILTERING_VERSION:-}
      # Agent Relay Configuration
      - ENABLE_AGENT=${ENABLE_AGENT:-false}
      - AGENT_PORT=${AGENT_PORT:-3500}
      - AGENT_API_KEY=${AGENT_API_KEY:-}
      # Web Portal Configuration
      - ENABLE_WEB_PORTAL=${ENABLE_WEB_PORTAL:-false}
      - WEB_PORTAL_PORT=${WEB_PORTAL_PORT:-3000}
      - WEB_PORTAL_SESSION_SECRET=${WEB_PORTAL_SESSION_SECRET:-}
      # Portal Database (defaults to built-in MySQL)
      - WEB_PORTAL_DB_HOST=${WEB_PORTAL_DB_HOST:-localhost}
      - WEB_PORTAL_DB_PORT=${WEB_PORTAL_DB_PORT:-3306}
      - WEB_PORTAL_DB_USER=${WEB_PORTAL_DB_USER:-netherdeck}
      - WEB_PORTAL_DB_PASSWORD=${WEB_PORTAL_DB_PASSWORD:-}
      - WEB_PORTAL_DB_NAME=${WEB_PORTAL_DB_NAME:-netherdeck}
      # Portal Admin (break-glass credentials)
      - WEB_PORTAL_ADMIN_USER=${WEB_PORTAL_ADMIN_USER:-admin}
      - WEB_PORTAL_ADMIN_PASSWORD=${WEB_PORTAL_ADMIN_PASSWORD:-}
      # Portal RCON (direct connection)
      - WEB_PORTAL_RCON_HOST=${WEB_PORTAL_RCON_HOST:-localhost}
      - WEB_PORTAL_RCON_PORT=${WEB_PORTAL_RCON_PORT:-25575}
      - WEB_PORTAL_RCON_PASSWORD=${WEB_PORTAL_RCON_PASSWORD:-}
      # Game Database Name (same MySQL instance, different database)
      - WEB_PORTAL_GAME_DB_NAME=${WEB_PORTAL_GAME_DB_NAME:-}
      # Portal Minecraft Files
      - WEB_PORTAL_MC_DIR=${WEB_PORTAL_MC_DIR:-/minecraft}
      # Portal Query Port (defaults to game port for query protocol)
      - WEB_PORTAL_QUERY_PORT=${WEB_PORTAL_QUERY_PORT:-25565}
      # OAuth / OIDC (optional)
      - WEB_PORTAL_OAUTH_ENABLED=${WEB_PORTAL_OAUTH_ENABLED:-false}
      - WEB_PORTAL_OAUTH_ISSUER_URL=${WEB_PORTAL_OAUTH_ISSUER_URL:-}
      - WEB_PORTAL_OAUTH_CLIENT_ID=${WEB_PORTAL_OAUTH_CLIENT_ID:-}
      - WEB_PORTAL_OAUTH_CLIENT_SECRET=${WEB_PORTAL_OAUTH_CLIENT_SECRET:-}
      - WEB_PORTAL_OAUTH_SCOPES=${WEB_PORTAL_OAUTH_SCOPES:-openid profile email}
      - WEB_PORTAL_OAUTH_CALLBACK_URL=${WEB_PORTAL_OAUTH_CALLBACK_URL:-}
      # SAML 2.0 (optional)
      - WEB_PORTAL_SAML_ENABLED=${WEB_PORTAL_SAML_ENABLED:-false}
      - WEB_PORTAL_SAML_IDP_METADATA_URL=${WEB_PORTAL_SAML_IDP_METADATA_URL:-}
      - WEB_PORTAL_SAML_ENTITY_ID=${WEB_PORTAL_SAML_ENTITY_ID:-}
      - WEB_PORTAL_SAML_CALLBACK_URL=${WEB_PORTAL_SAML_CALLBACK_URL:-}

networks:
  minecraft_network:
    driver: bridge

volumes:
  mc_data:
    driver: local
  mysql_data:
    driver: local
  smb_logs:
    driver: local
  supervisor_logs:
    driver: local

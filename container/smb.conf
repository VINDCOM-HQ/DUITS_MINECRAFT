[global]
  server string = Minecraft SMB Share
  log level = 1
  # Ensure proper socket directory permissions
  lock directory = /var/lib/samba/lock
  pid directory = /var/run/samba
  state directory = /var/lib/samba
  cache directory = /var/cache/samba
  private dir = /var/lib/samba/private
  # Network settings — interface controlled by EXPOSE_SMB env var
  interfaces = %SMB_INTERFACES%
  bind interfaces only = %SMB_BIND_ONLY%
  # Logging settings
  logging = file
  log file = /var/log/samba/log.%m
  max log size = 100
  # Authentication settings - secure mode
  security = user
  map to guest = Never
  client plaintext auth = no
  client ntlmv2 auth = yes
  # Protocol hardening - enforce SMB3 minimum
  server min protocol = SMB3_00
  smb encrypt = desired
  # File permissions - owner full access, group read, others none
  create mask = 0664
  directory mask = 0775
  # Disable printer support
  load printers = no
  printing = bsd
  printcap name = /dev/null
  disable spoolss = yes

[minecraft]
  path = /minecraft
  comment = Minecraft Server Files
  browseable = yes
  read only = no
  guest ok = no
  # Valid users configured at runtime via environment variable
  valid users = %SMB_USER%
  write list = %SMB_USER%
  force create mode = 0664
  force directory mode = 0775
  create mask = 0664
  directory mask = 0775

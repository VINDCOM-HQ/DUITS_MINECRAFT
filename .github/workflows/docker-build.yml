name: Build Docker Image

on:
  push:
    branches: [develop, main]
    paths:
      - 'container/**'
      - 'agent/**'
      - 'web/**'
      - 'NetherDeck Server/build/libs/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'container/**'
      - 'agent/**'
      - 'web/**'
      - 'NetherDeck Server/build/libs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        loader: [forge, neoforge, fabric]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vindcom/netherdeck-${{ matrix.loader }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: LOADER=${{ matrix.loader }}
          cache-from: type=gha,scope=${{ matrix.loader }}
          cache-to: type=gha,mode=max,scope=${{ matrix.loader }}
